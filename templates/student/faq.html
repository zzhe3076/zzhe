<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>常见问题 - 新生报到系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: #f5f7fa;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 0 0 30px 30px;
        }
        .back-btn {
            color: white;
            text-decoration: none;
        }
        .accordion-item {
            border: none;
            margin-bottom: 10px;
            border-radius: 12px !important;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .accordion-button {
            background: white;
            font-weight: 600;
            padding: 15px;
            border-radius: 12px !important;
        }
        .accordion-button:not(.collapsed) {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: none;
        }
        .accordion-button::after {
            filter: invert(1);
        }
        .accordion-button:not(.collapsed)::after {
            filter: invert(1);
        }
        .accordion-body {
            background: white;
            padding: 15px;
            color: #666;
            line-height: 1.8;
            border-top: 1px solid #f0f0f0;
        }
        .accordion-button:focus {
            box-shadow: none;
        }
        .no-data {
            text-align: center;
            padding: 60px 20px;
        }
        .search-box {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin-top: -30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .search-input {
            border-radius: 10px;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
        }
        .search-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="d-flex justify-content-between align-items-center">
            <a href="{% url 'student-dashboard' %}" class="back-btn">
                <i class="bi bi-arrow-left"></i> 返回
            </a>
            <h5 class="mb-0">常见问题</h5>
            <div style="width: 50px;"></div>
        </div>
    </div>

    <div class="container mt-3">
        {% if error %}
        <div class="search-box">
            <div class="no-data">
                <div class="no-data-icon">❓</div>
                <h5>{{ error }}</h5>
            </div>
        </div>
        {% else %}
        <div class="search-box">
            <input type="text" class="form-control search-input" placeholder="搜索问题..." id="searchInput">
        </div>

        {% if faqs %}
        <div class="accordion mt-3" id="faqAccordion">
            {% for faq in faqs %}
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#faq{{ faq.id }}">
                        <i class="bi bi-question-circle me-2 text-primary"></i>
                        {{ faq.question }}
                    </button>
                </h2>
                <div id="faq{{ faq.id }}" class="accordion-collapse collapse" data-bs-parent="#faqAccordion">
                    <div class="accordion-body">
                        <i class="bi bi-lightbulb me-2 text-warning"></i>
                        {{ faq.answer|linebreaks }}
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <div class="no-data">
            <div class="no-data-icon">📚</div>
            <h5>暂无常见问题</h5>
            <p class="text-muted">请咨询辅导员或查看通知公告</p>
        </div>
        {% endif %}
        {% endif %}

        <div class="alert alert-info mt-4">
            <i class="bi bi-info-circle"></i>
            如有其他问题，请联系辅导员或拨打学校热线
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('searchInput').addEventListener('input', function() {
            const searchText = this.value.toLowerCase();
            const items = document.querySelectorAll('.accordion-item');
            
            items.forEach(item => {
                const question = item.querySelector('.accordion-button').textContent.toLowerCase();
                const answer = item.querySelector('.accordion-body').textContent.toLowerCase();
                
                if (question.includes(searchText) || answer.includes(searchText)) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
