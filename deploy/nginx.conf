upstream welcome_assistant {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 10M;

    access_log /var/log/nginx/welcome_assistant_access.log;
    error_log /var/log/nginx/welcome_assistant_error.log;

    location /static/ {
        alias /var/www/welcome_assistant/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/welcome_assistant/media/;
        expires 7d;
    }

    location /api/ {
        proxy_pass http://welcome_assistant;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /admin/ {
        proxy_pass http://welcome_assistant;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://welcome_assistant;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
